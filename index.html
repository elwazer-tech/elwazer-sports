<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="robots" content="noindex,nofollow"/>
        <meta property="og:site_name" content="Elwazer Sports">
        <title>الوزير سبورت - Elwazer Sports | جدول مباريات اليوم والبث المباشر</title>
        
        <!-- استدعاء مكتبة المشغل العالمي Clappr Player -->
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
        
        <style>
            :root {
                --primary: #421480;
                --primary-gradient: linear-gradient(135deg, #2e0d5e 0%, #421480 100%);
                --bg-dark: #070708;
                --card-bg: #111115;
                --border-color: rgba(255, 255, 255, 0.06);
                --text-muted: rgba(255, 255, 255, 0.6);
            }

            * { margin: 0; padding: 0; box-sizing: border-box }
            body { 
                background: var(--bg-dark); 
                color: #fff; 
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.6;
                padding-bottom: 40px;
            }

            /* الهيدر العلوي للموقع */
            header {
                background: #0d0d11;
                border-bottom: 1px solid var(--border-color);
                padding: 15px 20px;
                text-align: center;
                position: sticky;
                top: 0;
                z-index: 100;
            }
            header h1 {
                font-size: 20px;
                font-weight: 800;
                background: linear-gradient(90deg, #ff007f, #00ff88);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .container {
                max-width: 1100px;
                margin: 0 auto;
                padding: 15px;
            }

            /* قسم المشغل المخفي افتراضياً ويفتح بسلاسة عند اختيار مباراة */
            .live-section {
                display: none; /* يظهر فقط عند الضغط على مباراة جارية */
                margin-bottom: 25px;
                background: #0d0d11;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                overflow: hidden;
                box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
                animation: slideDown 0.4s ease-out;
            }

            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .player-container { 
                position: relative; 
                width: 100%; 
                background: #000; 
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px;
            }

            .player-wrapper {
                position: relative;
                width: 100%;
                max-width: 120vh; 
                aspect-ratio: 16 / 9;
                background: #000;
                border-radius: 8px;
                overflow: hidden;
            }

            #clappr-player { width: 100%; height: 100%; }

            /* اللوجو الثابت بمقاييسك الدقيقة */
            .custom-video-logo {
                position: absolute !important;
                top: 0.1% !important;            
                right: 2.1% !important;          
                z-index: 999999 !important;      
                width: 18% !important;           
                aspect-ratio: 1.45 / 1 !important; 
                object-fit: fill !important;     
                pointer-events: none !important;
                background: transparent !important; 
                margin: 0 !important;
                padding: 0 !important;
                transition: right 0.1s ease-in-out;
            }

            /* زر تفعيل الصوت التفاعلي المطور للتغلب على حماية المتصفحات */
            .unmute-overlay {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 9999999 !important;
                background: rgba(10, 10, 10, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.15);
                color: #fff;
                padding: 12px 24px;
                border-radius: 30px;
                font-size: 14px;
                font-weight: bold;
                display: none; 
                align-items: center;
                gap: 10px;
                cursor: pointer;
                backdrop-filter: blur(8px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
                animation: pulse 2s infinite;
            }
            .unmute-overlay svg { width: 20px; height: 20px; fill: currentColor; }

            /* لوحة التنبيه الزجاجية الأنيقة في حال كان البث متوقفاً */
            .offline-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999998 !important;
                background: rgba(10, 10, 10, 0.92);
                display: none; 
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: #fff;
                text-align: center;
                padding: 20px;
                backdrop-filter: blur(10px);
            }
            .offline-overlay svg { width: 55px; height: 55px; fill: #ff3b30; margin-bottom: 15px; }

            /* زر تحديث المشغل */
            .embed-btn {
                position: absolute; top: 12px; left: 12px; z-index: 99999998 !important; background: rgba(15, 15, 15, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.15); color: #fff; padding: 6px 12px;
                border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 11px;
            }

            /* قسم تفاصيل المباراة وتشكيلتها المتوقعة */
            .match-details-box {
                background: #0c0c0c; padding: 15px; border-top: 1px solid rgba(255, 255, 255, 0.06);
            }
            .detail-header {
                font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #ff007f;
            }
            .lineup-grid {
                display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;
            }
            .lineup-team {
                background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);
            }
            .lineup-team h4 { font-size: 13px; color: #00ff88; margin-bottom: 8px; text-align: center; }
            .lineup-team ul { list-style: none; font-size: 12px; color: var(--text-muted); }
            .lineup-team li { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }

            /* عنوان قسم جدول المباريات */
            .section-title {
                font-size: 18px; font-weight: bold; margin: 20px 0 15px; padding-right: 10px;
                border-right: 3px solid #421480; display: flex; align-items: center; justify-content: space-between;
            }

            /* كروت المباريات */
            .matches-grid {
                display: grid; grid-template-columns: 1fr; gap: 12px;
            }
            @media (min-width: 768px) {
                .matches-grid { grid-template-columns: 1fr 1fr; }
            }

            .match-card {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 15px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                cursor: pointer;
                transition: transform 0.2s, border-color 0.2s;
            }
            .match-card:hover {
                transform: translateY(-2px);
                border-color: rgba(66, 20, 128, 0.4);
            }

            .match-league {
                font-size: 11px; color: var(--text-muted); font-weight: bold; margin-bottom: 10px;
                display: flex; justify-content: space-between; align-items: center;
            }
            .match-status {
                padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold;
            }
            .status-live { background: rgba(255, 0, 127, 0.15); color: #ff007f; animation: blink 1.5s infinite; }
            .status-waiting { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }

            @keyframes blink { 50% { opacity: 0.5; } }

            .match-teams {
                display: flex; align-items: center; justify-content: space-between; margin: 10px 0;
            }
            .team-col {
                flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
            }
            .team-logo { width: 45px; height: 45px; object-fit: contain; }
            .team-name { font-size: 13px; font-weight: bold; }

            .match-time-info {
                text-align: center; font-size: 11px; color: var(--text-muted); min-width: 80px;
            }
            .match-time { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 3px; }

            .match-meta {
                border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px; margin-top: 10px;
                display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted);
            }

            .btn-watch {
                display: block; width: 100%; text-align: center; background: var(--primary-gradient);
                color: #fff; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 12px;
                font-weight: bold; margin-top: 12px; border: none; cursor: pointer; transition: opacity 0.2s;
            }
            .btn-watch:hover { opacity: 0.9; }

            @media (max-width: 768px) {
                .custom-video-logo { right: 2.1% !important; top: 0.1% !important; width: 18% !important; }
            }
        </style>
    </head>
    <body>
        
        <header>
            <h1>الوزير سبورت - Elwazer Sports</h1>
        </header>

        <div class="container">
            
            <!-- 🎯 قسم مشغل البث التفاعلي (يفتح تلقائياً عند الضغط على أي مباراة جارية) 🎯 -->
            <div id="live-section" class="live-section">
                <div class="player-container">
                    <div class="player-wrapper">
                        
                        <button class="embed-btn" onclick="window.location.reload();">
                            <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: currentColor;"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                            تحديث المشغل
                        </button>

                        <div id="clappr-player"></div>

                        <img src="logo.png" class="custom-video-logo" id="custom-logo" alt="Logo">

                        <div id="offline-overlay" class="offline-overlay">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            <div class="offline-title" id="offline-title" style="font-size: 18px; font-weight: bold; margin-bottom: 8px;">البث متوقف مؤقتاً</div>
                            <div class="offline-subtitle" style="font-size: 13px; color: rgba(255,255,255,0.6); max-width: 320px; line-height: 1.5;">هذه المباراة لم تبدأ بعد، أو أن السيرفر معطل حالياً. يرجى تجربة المباراة وقت انطلاقها.</div>
                        </div>

                        <div id="unmute-overlay" class="unmute-overlay" onclick="unmutePlayer()">
                            <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM19 12c0 3.28-2.16 6.07-5.14 7.03c1.92-.61 3.44-2.13 4.05-4.05C18.42 13.93 19 12.82 19 12zm-8.81 7.19L5.35 14H2v-4h3.35l4.84-5.19C10.74 4.26 11.5 4.61 11.5 5.3v13.4c0 .69-.76 1.04-1.31.49z"/></svg>
                            انقر لتفعيل الصوت والمشاهدة
                        </div>

                    </div>
                </div>

                <!-- تفاصيل المباراة النشطة وتحصيل التشكيلات برمجياً -->
                <div class="match-details-box">
                    <div class="detail-header">📊 تفاصيل المباراة والتشكيلة المتوقعة:</div>
                    <div class="lineup-grid">
                        <div class="lineup-team" id="lineup-team-a">
                            <h4 id="team-a-title">الفريق الأول</h4>
                            <ul id="team-a-list"></ul>
                        </div>
                        <div class="lineup-team" id="lineup-team-b">
                            <h4 id="team-b-title">الفريق الثاني</h4>
                            <ul id="team-b-list"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- جدول مباريات اليوم -->
            <div class="section-title">
                <span>📅 جدول مباريات اليوم والبث المباشر</span>
            </div>

            <div class="matches-grid" id="matches-container">
                <!-- يتم توليد كروت المباريات هنا تلقائياً بواسطة الجافاسكريبت -->
            </div>

        </div>

        <script>
            /* 🎯 قاعدة بيانات المباريات (قم بتحديث هذه المصفوفة يومياً لتغيير المباريات برمتها) 🎯 */
            var matchesData = [
                {
                    id: 1,
                    league: "دوري أبطال أوروبا",
                    status: "live", // "live" للجارية الآن، "waiting" للمباريات القادمة
                    teamA: {
                        name: "ريال مدريد",
                        logo: "https://ssl.gstatic.com/onebox/media/sports/logos/Thg0vby9yoD697Vz8S9p9A_96x96.png"
                    },
                    teamB: {
                        name: "بايرن ميونخ",
                        logo: "https://ssl.gstatic.com/onebox/media/sports/logos/Z960Z_77m9f54668_96x96.png"
                    },
                    time: "09:00 م",
                    channel: "beIN Sports HD 1",
                    commentator: "حفيظ دراجي",
                    streamUrl: "https://live.kooran53.cfd/goolato3_480/index.m3u8", // رابط البث المباشر للقناة
                    lineupA: ["كورتوا (GK)", "كارفخال", "ميليتاو", "روديغر", "ميندي", "فالفيردي", "تشواميني", "بيلينغهام", "رودريغو", "مبابي", "فينيسيوس"],
                    lineupB: ["نوير (GK)", "كيميتش", "أوباميكانو", "مين جاي", "ديفيز", "بالينيا", "بافلوفيتش", "أوليز", "موسيالا", "غنابري", "هاري كين"]
                },
                {
                    id: 2,
                    league: "الدوري الإنجليزي الممتاز",
                    status: "live",
                    teamA: {
                        name: "مانشستر سيتي",
                        logo: "https://ssl.gstatic.com/onebox/media/sports/logos/vctSva4g0pLp9Zon6U6n3w_96x96.png"
                    },
                    teamB: {
                        name: "آرسنال",
                        logo: "https://ssl.gstatic.com/onebox/media/sports/logos/469_77m9f54668_96x96.png"
                    },
                    time: "07:30 م",
                    channel: "beIN Sports HD 2",
                    commentator: "خليل البلوشي",
                    streamUrl: "https://2cup.s3.us-east-2.amazonaws.com/max2/max2_720p/index.m3u8",
                    lineupA: ["إيدرسون (GK)", "ووكر", "دياز", "أكانجي", "غفارديول", "رودري", "كوفاسيتش", "برناردو", "دي بروين", "فودين", "هالاند"],
                    lineupB: ["رايا (GK)", "بين وايت", "ساليبا", "غابرييل", "تيمبر", "بارتي", "رايس", "أوديغارد", "ساكا", "مارتينلي", "هافرتز"]
                },
                {
                    id: 3,
                    league: "الدوري الإسباني",
                    status: "waiting", // لم تبدأ بعد
                    teamA: {
                        name: "برشلونة",
                        logo: "https://ssl.gstatic.com/onebox/media/sports/logos/669_77m9f54668_96x96.png"
                    },
                    teamB: {
                        name: "أتلتيكو مدريد",
                        logo: "https://ssl.gstatic.com/onebox/media/sports/logos/p920Z_77m9f54668_96x96.png"
                    },
                    time: "11:00 م",
                    channel: "beIN Sports HD 3",
                    commentator: "عصام الشوالي",
                    streamUrl: "#", // لا يوجد بث نشط حالياً
                    lineupA: ["تير شتيغن (GK)", "كوندي", "كوبارسي", "إينيغو", "بالدي", "كاسادو", "بيدري", "داني أولمو", "لامين يامال", "رافينيا", "ليفاندوفسكي"],
                    lineupB: ["أوبلاك (GK)", "مولينا", "لو لورماند", "خيمينيز", "رينيلدو", "دي بول", "كوكي", "غالاجير", "لورينتي", "غريزمان", "سورلوث"]
                }
            ];

            var player = null;
            var currentPlayingUrl = "";

            // توليد جدول المباريات ديناميكياً عند فتح الصفحة
            function initMatchesTable() {
                var container = document.getElementById('matches-container');
                container.innerHTML = "";

                matchesData.forEach(function(match) {
                    var statusClass = match.status === 'live' ? 'status-live' : 'status-waiting';
                    var statusText = match.status === 'live' ? '● جاري الآن' : 'لم تبدأ';
                    var btnText = match.status === 'live' ? 'شاهد البث المباشر 📡' : 'تفاصيل المباراة 📊';

                    var cardHtml = `
                        <div class="match-card" onclick="selectMatch(${match.id})">
                            <div class="match-league">
                                <span>🏆 ${match.league}</span>
                                <span class="match-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="match-teams">
                                <div class="team-col">
                                    <img class="team-logo" src="${match.teamA.logo}" alt="${match.teamA.name}">
                                    <span class="team-name">${match.teamA.name}</span>
                                </div>
                                <div class="match-time-info">
                                    <div class="match-time">${match.time}</div>
                                    <span>توقيت مكة</span>
                                </div>
                                <div class="team-col">
                                    <img class="team-logo" src="${match.teamB.logo}" alt="${match.teamB.name}">
                                    <span class="team-name">${match.teamB.name}</span>
                                </div>
                            </div>
                            <div class="match-meta">
                                <span>📺 ${match.channel}</span>
                                <span>🎙️ ${match.commentator}</span>
                            </div>
                            <button class="btn-watch">${btnText}</button>
                        </div>
                    `;
                    container.innerHTML += cardHtml;
                });
            }

            // اختيار مباراة وتشغيلها في مشغل Clappr الموحد في الأعلى
            function selectMatch(matchId) {
                var match = matchesData.find(function(m) { return m.id === matchId; });
                if (!match) return;

                // إظهار قسم المشغل والتفاصيل مع تحريك سلس
                var liveSection = document.getElementById('live-section');
                liveSection.style.display = 'block';
                liveSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

                // تحديث التشكيلات والبيانات أسفل المشغل
                document.getElementById('team-a-title').innerText = "تشكيلة " + match.teamA.name;
                document.getElementById('team-b-title').innerText = "تشكيلة " + match.teamB.name;

                var listA = document.getElementById('team-a-list');
                var listB = document.getElementById('team-b-list');
                listA.innerHTML = "";
                listB.innerHTML = "";

                match.lineupA.forEach(function(player) { listA.innerHTML += `<li>🏃‍♂️ ${player}</li>`; });
                match.lineupB.forEach(function(player) { listB.innerHTML += `<li>🏃‍♂️ ${player}</li>`; });

                // تشغيل السورس بالمشغل
                var streamUrl = match.streamUrl;
                currentPlayingUrl = streamUrl;

                var offlineOverlay = document.getElementById('offline-overlay');
                var unmuteOverlay = document.getElementById('unmute-overlay');

                // تدمير المشغل القديم إذا كان موجوداً لبناء الجديد
                if (player) {
                    player.destroy();
                }

                // فحص إذا كانت المباراة متوقفة أو لم تبدأ
                if (!streamUrl || streamUrl === '#' || match.status !== 'live') {
                    offlineOverlay.style.display = 'flex';
                    unmuteOverlay.style.display = 'none';
                    document.getElementById('offline-title').innerText = "المباراة لم تبدأ بعد";
                } else {
                    offlineOverlay.style.display = 'none';
                    
                    // بناء المشغل الجديد للقناة المحددة
                    player = new Clappr.Player({
                        source: streamUrl,
                        parentId: '#clappr-player',
                        width: '100%',
                        height: '100%',
                        autoPlay: true,
                        mute: true,
                        preload: 'auto',
                        stretching: 'exactfit',
                        playback: {
                            playInline: true,
                            recycleVideo: true,
                            hlsMinimumjsversion: '0.12.0',
                            hlsjsConfig: {
                                enableWorker: true,
                                lowLatencyMode: true,
                                maxBufferLength: 12,
                                liveBackBufferLength: 0,
                                manifestLoadingMaxRetry: 10,
                                levelLoadingMaxRetry: 10
                            }
                        }
                    });

                    // تفعيل المستمعات والأصوات للمشغل الجديد
                    player.on(Clappr.Events.PLAYER_READY, function() {
                        injectOverlays();
                        player.unmute();
                        setTimeout(function() {
                            var volumePlugin = player.getPlugin('volume');
                            if (player.getVolume() === 0 || (volumePlugin && volumePlugin.$el.hasClass('muted'))) {
                                document.getElementById('unmute-overlay').style.display = 'flex';
                            }
                        }, 600);
                    });

                    player.on(Clappr.Events.CORE_CONTAINERS_CREATED, function() {
                        injectOverlays();
                    });

                    player.on(Clappr.Events.PLAYER_PLAY, function() {
                        document.getElementById('offline-overlay').style.display = 'none';
                    });

                    // تعديل موقع الشعار برمجياً في وضع ملء الشاشة لحفظ الأبعاد
                    player.on(Clappr.Events.CORE_FULLSCREEN, function(isCurrentlyFullscreen) {
                        var logo = document.getElementById('custom-logo');
                        if (logo) {
                            if (isCurrentlyFullscreen) {
                                logo.style.setProperty('right', '4.5%', 'important');
                            } else {
                                logo.style.setProperty('right', '2.1%', 'important');
                            }
                        }
                    });

                    // نظام الإنعاش التلقائي
                    player.on(Clappr.Events.PLAYER_ERROR, function() {
                        offlineOverlay.style.display = 'flex';
                        document.getElementById('offline-title').innerText = "جاري إعادة الاتصال بالبث...";
                        unmuteOverlay.style.display = 'none';

                        setTimeout(function() {
                            if (currentPlayingUrl && currentPlayingUrl !== '#') {
                                player.load(currentPlayingUrl);
